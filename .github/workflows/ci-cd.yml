name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Create index.html for GitHub Pages
        run: |
          CSS_FILE=$(ls dist/client/assets/styles-*.css | head -1 | xargs basename)
          JS_FILE=$(ls dist/client/assets/index-*.js | head -1 | xargs basename)
          cat > dist/client/index.html << EOF
          <!DOCTYPE html>
          <html lang="pt-BR">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Edifique Construções</title>
            <link rel="stylesheet" href="/edifique_construcoes/assets/${CSS_FILE}">
          </head>
          <body>
            <div id="root"></div>
            <script type="module" src="/edifique_construcoes/assets/${JS_FILE}"></script>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          folder: dist/client
          branch: gh-pages
          single-commit: true
