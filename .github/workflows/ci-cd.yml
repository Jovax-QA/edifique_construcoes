name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build:gh

      - name: Create index.html for GitHub Pages
        run: |
          CSS_FILE=$(ls dist/client/assets/styles-*.css | head -1 | xargs basename)
          JS_FILE=$(ls dist/client/assets/index-*.js | head -1 | xargs basename)
          ROUTES_FILE=$(ls dist/client/assets/routes-*.js | head -1 | xargs basename)
          cat > dist/index.html << EOF
          <!DOCTYPE html>
          <html lang="pt-BR">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Edifique Construções</title>
            <link rel="stylesheet" href="/edifique_construcoes/assets/${CSS_FILE}">
          </head>
          <body>
            <div id="root"></div>
            <script type="module" src="/edifique_construcoes/assets/${ROUTES_FILE}"></script>
            <script type="module" src="/edifique_construcoes/assets/${JS_FILE}"></script>
          </body>
          </html>
          EOF
          cp -r dist/client/assets dist/

      - name: Verify build output
        run: |
          echo "Build output:"
          ls -la dist/
          echo "Index.html content:"
          cat dist/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
