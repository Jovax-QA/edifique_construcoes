name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:gh

      # GitHub Pages does not provide an SPA rewrite rule. Serving the built
      # document as 404.html lets client-side URLs load the application too.
      - name: Prepare GitHub Pages files
        shell: bash
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Verify build output
        shell: bash
        run: |
          test -f dist/index.html
          test -f dist/404.html
          test -f dist/.nojekyll
          grep -q '/${{ github.event.repository.name }}/assets/' dist/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
